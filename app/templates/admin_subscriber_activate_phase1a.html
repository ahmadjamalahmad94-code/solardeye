{% extends "base.html" %}{% block body %}<div class="page-shell"><div class="page-header"><h1>تفعيل اشتراك المشترك</h1></div><form method="post" class="card form-card"><div class="info-box"><p><strong>المستخدم:</strong> {{ user.full_name or user.username }}</p><p><strong>الحالة الحالية:</strong> {{ subscription.status if subscription else '—' }}</p></div><div class="form-grid"><label>الخطة<select name="plan_id" required>{% for plan in plans %}<option value="{{ plan.id }}">{{ plan.name_ar }} — {{ plan.price }} {{ plan.currency }}</option>{% endfor %}</select></label><label>عدد الأيام<input type="number" name="days" value="30" min="1" required></label><label>ملاحظات<textarea name="notes" rows="4"></textarea></label></div><div class="form-actions"><button class="btn btn-primary" type="submit">تفعيل الاشتراك</button><a class="btn btn-light" href="{{ url_for('main.admin_subscribers', lang=ui_lang) }}">رجوع</a></div></form></div>{% endblock %}
