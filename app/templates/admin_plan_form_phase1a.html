{% extends "base.html" %}{% block content %}<div class="page-shell"><div class="page-header"><h1>{{ 'تعديل خطة' if plan else 'إضافة خطة' }}</h1></div><form method="post" class="card form-card"><div class="form-grid"><label>الكود<input type="text" name="code" value="{{ plan.code if plan else '' }}" required></label><label>الاسم عربي<input type="text" name="name_ar" value="{{ plan.name_ar if plan else '' }}" required></label><label>الاسم إنجليزي<input type="text" name="name_en" value="{{ plan.name_en if plan else '' }}" required></label><label>السعر<input type="number" step="0.01" name="price" value="{{ plan.price if plan else 0 }}"></label><label>العملة<input type="text" name="currency" value="{{ plan.currency if plan else 'USD' }}"></label><label>المدة بالأيام<input type="number" name="duration_days_default" value="{{ plan.duration_days_default if plan else 30 }}"></label><label>عدد الأجهزة<input type="number" name="max_devices" value="{{ plan.max_devices if plan else 1 }}"></label><label>الترتيب<input type="number" name="sort_order" value="{{ plan.sort_order if plan else 0 }}"></label></div><div class="checkbox-grid"><label><input type="checkbox" name="is_active" {% if not plan or plan.is_active %}checked{% endif %}> الخطة مفعلة</label><label><input type="checkbox" name="can_manage_devices"> إدارة الأجهزة</label><label><input type="checkbox" name="can_manage_integrations"> إدارة الربط</label><label><input type="checkbox" name="can_use_telegram"> Telegram</label><label><input type="checkbox" name="can_use_sms"> SMS</label><label><input type="checkbox" name="can_view_diagnostics"> التشخيص</label><label><input type="checkbox" name="can_view_api_explorer"> API Explorer</label></div><div class="form-actions"><button class="btn btn-primary" type="submit">حفظ</button><a class="btn btn-light" href="{{ url_for('main.admin_plans', lang=ui_lang) }}">رجوع</a></div></form></div>{% endblock %}
