<!doctype html>
<html lang="{{ ui_lang or 'ar' }}" dir="{{ 'ltr' if (ui_lang or 'ar') == 'en' else 'rtl' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or 'Solar Platform V4' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="theme-saas" data-lang="{{ ui_lang or 'ar' }}">
  <div class="floating-ui-panel">
    <div class="theme-switcher" aria-label="theme switcher">
      <button type="button" class="theme-btn" data-theme="theme-minimal">Minimal</button>
      <button type="button" class="theme-btn" data-theme="theme-saas">SaaS</button>
      <button type="button" class="theme-btn" data-theme="theme-glow">Glow</button>
    </div>
    <button type="button" class="lang-btn" id="langToggle">{{ 'English' if (ui_lang or 'ar') == 'ar' else 'العربية' }}</button>
  </div>
  {% block body %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js', v='20260414-notifyfix2') }}"></script>
</body>
</html>
