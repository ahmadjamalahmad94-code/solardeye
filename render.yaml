services:
  - type: web
    name: solardeye
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: LOCAL_TIMEZONE
        value: Asia/Hebron
      - key: AUTO_SYNC_ENABLED
        value: true
      - key: AUTO_SYNC_MINUTES
        value: 5
      - key: DATABASE_URL
        fromDatabase:
          name: solardeye-db
          property: connectionString

databases:
  - name: solardeye-db
    plan: free
    databaseName: solardeye_db
    user: solardeye_db_user
